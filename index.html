<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gastos">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#15171C">
<title>Controle de Gastos</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand"><b>Controle de Gastos</b><small>controle pessoal</small></div>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="icon-btn sm" id="fontDown" aria-label="Diminuir fonte">A-</button>
      <button class="icon-btn sm" id="fontUp" aria-label="Aumentar fonte">A+</button>
      <button class="icon-btn" id="themeToggle" aria-label="Alternar tema">☀</button>
      <button class="icon-btn" id="openSettings" aria-label="Configurações">⚙</button>
    </div>
  </header>

  <div class="monthnav">
    <button id="prevMonth" aria-label="Mês anterior">‹</button>
    <span id="periodLabel">—</span>
    <button id="nextMonth" aria-label="Próximo mês">›</button>
  </div>

  <div class="status-grid">
    <div class="card" id="cardWeek">
      <div class="label">Esta semana</div>
      <div class="remain" id="weekRemain">—</div>
      <div class="sub" id="weekSub"></div>
      <div class="bar"><i id="weekBar"></i></div>
    </div>
    <div class="card" id="cardMonth">
      <div class="label">Este mês</div>
      <div class="remain" id="monthRemain">—</div>
      <div class="sub" id="monthSub"></div>
      <div class="bar"><i id="monthBar"></i></div>
    </div>
  </div>

  <div class="add">
    <h2>Novo gasto</h2>
    <div class="amount-row"><span id="curSym">€</span>
      <input id="amount" inputmode="decimal" placeholder="0,00" autocomplete="off"></div>
    <div class="chips" id="catChips"></div>
    <div class="meta-row">
      <div><label>Data</label><input type="date" id="date"></div>
      <div><label>Cidade</label><select id="city"></select></div>
    </div>
    <input type="text" id="note" placeholder="Descrição (opcional)" autocomplete="off" style="margin-bottom:6px">
    <button class="btn btn-block" id="addBtn">Adicionar gasto</button>
    <div class="hint" id="hint"></div>
  </div>

  <div class="charts">
    <div>
      <div class="section-title">Por categoria · mês</div>
      <div class="card donut-card" id="donutCard">
        <svg id="donut" width="104" height="104" viewBox="0 0 104 104" style="flex:0 0 auto"></svg>
        <div class="donut-legend" id="legend"></div>
      </div>
    </div>
    <div>
      <div class="section-title">Por cidade · mês</div>
      <div class="card"><div id="cityList"></div></div>
    </div>
    <div id="barsSection">
      <div class="section-title">Últimos 7 dias</div>
      <div class="card"><div class="bars" id="bars"></div></div>
    </div>
  </div>

  <div>
    <div class="section-title">Lançamentos recentes</div>
    <div class="card"><div class="list" id="list"></div></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <button class="close-x" id="closeSettings" aria-label="Fechar">×</button>
    <h3>Configurações</h3>

    <div class="grp">
      <label>Tetos de gasto</label>
      <div class="row-2">
        <div><small style="color:var(--muted);font-size:12px">Semanal</small>
          <input type="number" id="capWeek" inputmode="decimal" placeholder="sem limite"></div>
        <div><small style="color:var(--muted);font-size:12px">Mensal</small>
          <input type="number" id="capMonth" inputmode="decimal" placeholder="sem limite"></div>
      </div>
    </div>

    <div class="grp">
      <label>Categorias</label>
      <div class="cat-list" id="catListSettings"></div>
      <div class="color-pick" id="catColorPick"></div>
      <div class="add-cat">
        <input type="text" id="newCat" placeholder="Nova categoria" autocomplete="off">
        <button class="btn" id="addCat">Criar</button>
      </div>
    </div>

    <div class="grp">
      <label>Cidades</label>
      <div class="toggle-row">
        <span>Habilitar seleção de cidade</span>
        <label class="toggle"><input type="checkbox" id="cityEnabled"><span class="slider"></span></label>
      </div>
      <div id="citySettingsContent">
        <div class="cat-list" id="cityListSettings" style="margin-top:10px"></div>
        <div class="color-pick" id="cityColorPick"></div>
        <div class="add-cat">
          <input type="text" id="newCity" placeholder="Nova cidade" autocomplete="off">
          <button class="btn" id="addCity">Criar</button>
        </div>
      </div>
    </div>

    <div class="grp">
      <label>Notificações</label>
      <div class="notif-permission-row">
        <span id="notifStatus" class="notif-status pending">—</span>
        <button class="ghost" id="notifRequestBtn" style="flex:0 0 auto">Ativar</button>
      </div>
      <div class="toggle-row" style="margin-top:10px">
        <span>Avisar ao ultrapassar teto</span>
        <label class="toggle"><input type="checkbox" id="notifBudget"><span class="slider"></span></label>
      </div>
      <div class="toggle-row" style="margin-top:8px">
        <span>Resumo diário de gastos</span>
        <label class="toggle"><input type="checkbox" id="notifDailySummary"><span class="slider"></span></label>
      </div>
      <div id="notifTimeRow" class="notif-time-row">
        <span style="font-size:13px;color:var(--muted)">Horário do resumo</span>
        <input type="time" id="notifDailyTime" value="21:00" style="width:auto;padding:6px 10px">
      </div>
    </div>

    <div class="grp">
      <label>Backup dos dados</label>
      <div style="display:flex;gap:10px">
        <button class="ghost" id="exportBtn">Exportar (.json)</button>
        <button class="ghost" id="importBtn">Importar</button>
        <input type="file" id="importFile" accept="application/json" hidden>
      </div>
    </div>

    <div class="grp"><button class="danger" id="clearBtn">Apagar todos os dados</button></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
